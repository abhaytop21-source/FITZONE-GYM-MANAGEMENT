<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="sidebar-header">

            <h2 class="gym-name">FITZONE</h2>

        </div>

        <div class="owner-profile">

            <div class="owner-avatar">
                👤
            </div>

            <h3 class="owner-name">
                Gym Owner
            </h3>

            <p class="owner-role">
                Administrator
            </p>

            <p class="owner-email" id="ownerEmail">
                owner@fitzone.com
            </p>

        </div>

        <ul>

            <li><a class="dash-btn active" href="dashboard.html">🏠 Dashboard</a></li>

            <li><a class="dash-btn" href="members.html">👥 Members</a></li>

            <li><a class="dash-btn" href="attendance.html">📅 Attendance</a></li>

            <li><a class="dash-btn" href="payments.html">💳 Payments</a></li>

            <li><a class="dash-btn" href="settings.html">⚙ Gym Profile</a></li>

        </ul>

        <a class="log-btn" href="#" id="logoutBtn">
            🚪 Logout
        </a>

        <div class="sidebar-footer">

            FITZONE v2.0

        </div>

    </div>

    <div class="main-content">

        <h1>Members Management</h1>

        <div class="member-form">

            <input
                type="text"
                id="memberName"
                placeholder="Member Name"
            >

            <input
                type="text"
                id="memberPhone"
                placeholder="Phone Number"
            >

            <select id="memberPlan" class="plan-select">

                <option value="">Select Plan</option>
                <option>Basic</option>
                <option>Premium</option>
                <option>VIP</option>

            </select>

            <button id="addMemberBtn">
                Add Member
            </button>

        </div>

        <br>

        <input
        type="text"
        id="searchMember" class="search-input"
        placeholder="🔍 Search Member..."
        >

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Plan</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="memberTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/members.js"></script>
<script src="js/global.js"></script>
<script src="js/toast.js"></script>

</body>
</html>
