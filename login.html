<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h2 class="gym-name">FITZONE</h2>
        <h2>Owner Login</h2>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

            <p id="errorMessage"></p>

        </form>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
