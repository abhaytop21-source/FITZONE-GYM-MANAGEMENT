<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
     
    <div class="sidebar">

        <div class="sidebar-header">

            <h2 class="gym-name">FITZONE</h2>

        </div>

        <div class="owner-profile">

            <div class="owner-avatar">
                👤
            </div>

            <h3 class="owner-name">
                Gym Owner
            </h3>

            <p class="owner-role">
                Administrator
            </p>

            <p class="owner-email" id="ownerEmail">
                owner@fitzone.com
            </p>

        </div>

        <ul>

            <li><a class="dash-btn active" href="dashboard.html">🏠 Dashboard</a></li>

            <li><a class="dash-btn" href="members.html">👥 Members</a></li>

            <li><a class="dash-btn" href="attendance.html">📅 Attendance</a></li>

            <li><a class="dash-btn" href="payments.html">💳 Payments</a></li>

            <li><a class="dash-btn" href="settings.html">⚙ Gym Profile</a></li>

        </ul>

        <a class="log-btn" href="#" id="logoutBtn">
            🚪 Logout
        </a>

        <div class="sidebar-footer">

            FITZONE v2.0

        </div>

    </div>

     <!-- Main Content -->

    <div class="main-content">

        <div class="topbar">

            <button id="menuBtn" class="menu-btn">
                ☰
            </button>

            <div class="topbar-right">

                <span id="todayDate"></span>

            </div>

        </div>

        <h1>Dashboard</h1>

        <div class="cards">

            <div class="dashboard-card">
                <h3>Total Members</h3>
                <h2 id="dashboardMembers">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Present Today</h3>
                <h2 id="dashboardPresent">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Total Revenue</h3>
                <h2 id="dashboardRevenue">₹0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Pending Payments</h3>
                <h2 id="dashboardPending">0</h2>
            </div>

        </div>

       <div class="member-dashboard">

            <h2>👥 Recent Members</h2>

            <div id="memberCards">

            </div>

        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>
<script src="js/global.js"></script>
<script src="js/toast.js"></script>
<script src="js/responsive.js"></script>

</body>
</html>
