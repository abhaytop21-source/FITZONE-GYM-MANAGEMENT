<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Profile | FITZONE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="sidebar-header">

            <h2 class="gym-name">FITZONE</h2>

        </div>

        <div class="owner-profile">

            <div class="owner-avatar">
                👤
            </div>

            <h3 class="owner-name">
                Gym Owner
            </h3>

            <p class="owner-role">
                Administrator
            </p>

            <p class="owner-email" id="ownerEmail">
                owner@fitzone.com
            </p>

        </div>

        <ul>

            <li><a class="dash-btn active" href="dashboard.html">🏠 Dashboard</a></li>

            <li><a class="dash-btn" href="members.html">👥 Members</a></li>

            <li><a class="dash-btn" href="attendance.html">📅 Attendance</a></li>

            <li><a class="dash-btn" href="payments.html">💳 Payments</a></li>

            <li><a class="dash-btn" href="settings.html">⚙ Gym Profile</a></li>

        </ul>

        <a class="log-btn" href="#" id="logoutBtn">
            🚪 Logout
        </a>

        <div class="sidebar-footer">

            FITZONE v2.0

        </div>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <h1>Gym Profile</h1>

        <p>
            Manage your gym information. These details will be shown throughout the system.
        </p>

        <div class="member-form">

            <input
                type="text"
                id="gymName"
                placeholder="Gym Name">

            <input
                type="text"
                id="ownerName"
                placeholder="Owner Name">

            <input
                type="text"
                id="phone"
                placeholder="Phone Number">

            <input
                type="email"
                id="email"
                placeholder="Email Address">

            <input
                type="text"
                id="address"
                placeholder="Gym Address">

            <input
                type="time"
                id="openingTime">

            <input
                type="time"
                id="closingTime">

            <button id="saveSettings">
                💾 Save Gym Profile
            </button>

        </div>

    </div>

</div>

<script src="js/settings.js"></script>
<script src="js/global.js"></script>

</body>
</html>
